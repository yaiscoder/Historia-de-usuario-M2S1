<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio personal</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1 id="encabezado">Yaila Ustate Cujia</h1>
        <br>
        <br>
        <nav>
            <ul id="enlace">
                <li><a href="#sobremi">Sobre mí</a></li>
                <li><a href="#proyectos">Proyectos</a></li>
                <li><a href="#contacto">Contacto</a></li>
                <li><a href="mascotas.html" target="_blank">Mascotas</a></li>
            </ul>
        </nav>
    
    </header>
    <main id="principal">
        <section id="sobremi">
            <h2>Sobre mí</h2><br><br>
            <p>Hola! mi nombre es Yaila Ustate, tengo 17 años y actualmente estoy en entrenamiento con Riwi</p>
        </section>

        <section id="proyectos">
            <h2>Proyectos</h2>
            <ul id="project">
                <li><a href="#proyecto1">Proyecto 1</a></li>
                <li><a href="#proyecto2">Proyecto 2</a></li>
                <li><a href="#proyecto3">Proyecto 3</a></li>

        <section id="contacto">
            <h2>Contacto</h2>
            <form action="index.html" method="get">
                <br><br>
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" required><br><br>

                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" name="correo" required><br><br>

                <label for="telefono">Telefono</label>
                <input type="number" id="telefono" name="telefono" required min="1"><br><br>

                <button type="submit">Enviar</button><br><br>
            </form>
        </section>
    </main>

</body>

</html>
